services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: prolog
      POSTGRES_PASSWORD: localpassword
      POSTGRES_DB: prolog
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prolog -d prolog"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://prolog:localpassword@db:5432/prolog
      JWT_SECRET: local-dev-secret-not-for-production-use
      JWT_EXPIRY_DAYS: 7
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy

  nginx:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx-local.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend

volumes:
  postgres_data:
