services:
  backend:
    build: ./backend
    container_name: prolog-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@prolog-db:5432/${DB_NAME:-prolog}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_DAYS: ${JWT_EXPIRY_DAYS:-7}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      NODE_ENV: ${NODE_ENV:-production}
    expose:
      - "8000"
    ports:
      - "127.0.0.1:18001:8000"
    networks:
      - docker-shared-net

  # Frontend: built into nginx image (React + Vite → static files)
  frontend:
    build: ./frontend
    container_name: prolog-frontend
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"
    ports:
      - "127.0.0.1:18000:80"
    networks:
      - docker-shared-net

networks:
  docker-shared-net:
    external: true
    name: docker-shared-net
